<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIB - Personal Interview Brain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --primary: #6366f1;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container { max-width: 800px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
    .logo { width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab {
      padding: 10px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--primary); }
    .tab.active { background: var(--primary); border-color: var(--primary); }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }
    
    .question { font-size: 1.1rem; margin-bottom: 10px; }
    .answer { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px; }
    
    .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
    .tag { 
      padding: 3px 10px; 
      background: rgba(99, 102, 241, 0.2); 
      color: var(--primary); 
      border-radius: 20px; 
      font-size: 0.8rem; 
    }
    
    .actions { display: flex; gap: 10px; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-forgot { background: var(--danger); color: white; }
    .btn-vague { background: var(--warning); color: black; }
    .btn-remembered { background: var(--success); color: white; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: var(--text-dim); }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
    }
    textarea { min-height: 100px; resize: vertical; }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    
    .empty { text-align: center; padding: 40px; color: var(--text-dim); }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
    .stat-label { color: var(--text-dim); font-size: 0.8rem; margin-top: 5px; }
    
    .section-title { font-size: 1.2rem; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    
    [v-cloak] { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><div class="logo">P</div> PIB - Personal Interview Brain</h1>
      <span style="color: var(--text-dim)">间隔重复复习系统</span>
    </header>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('review')">今日复习</div>
      <div class="tab" onclick="switchTab('draft')">草稿箱</div>
      <div class="tab" onclick="switchTab('add')">添加题目</div>
    </div>
    
    <!-- 复习页面 -->
    <div id="review-page">
      <div class="stats" id="stats"></div>
      <div id="review-list"></div>
    </div>
    
    <!-- 草稿页面 -->
    <div id="draft-page" style="display:none">
      <div id="draft-list"></div>
    </div>
    
    <!-- 添加页面 -->
    <div id="add-page" style="display:none">
      <div class="card">
        <div class="form-group">
          <label>问题内容</label>
          <textarea id="question-content" placeholder="输入你的面试问题..."></textarea>
        </div>
        <div class="form-group">
          <label>答案</label>
          <textarea id="question-answer" placeholder="输入答案..."></textarea>
        </div>
        <div class="form-group">
          <label>标签 (逗号分隔)</label>
          <input type="text" id="question-tags" placeholder="golang, 内存, 逃逸">
        </div>
        <button class="btn btn-primary" onclick="createQuestion()">创建题目</button>
      </div>
    </div>
  </div>
  
  <script>
    const API = 'http://localhost:8081/api/v1';
    let currentTab = 'review';
    
    async function fetchJSON(url) {
      const res = await fetch(url);
      return res.json();
    }
    
    async function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      document.getElementById('review-page').style.display = tab === 'review' ? 'block' : 'none';
      document.getElementById('draft-page').style.display = tab === 'draft' ? 'block' : 'none';
      document.getElementById('add-page').style.display = tab === 'add' ? 'block' : 'none';
      
      if (tab === 'review') loadReview();
      if (tab === 'draft') loadDrafts();
    }
    
    async function loadReview() {
      const questions = await fetchJSON(`${API}/questions/review`);
      const all = await fetchJSON(`${API}/questions?status=active`);
      
      // Stats
      const today = new Date().toDateString();
      const reviewedToday = all.filter(q => {
        if (!q.updated_at) return false;
        return new Date(q.updated_at).toDateString() === today;
      }).length;
      
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-value">${questions.length}</div><div class="stat-label">待复习</div></div>
        <div class="stat"><div class="stat-value">${reviewedToday}</div><div class="stat-label">今日已复习</div></div>
        <div class="stat"><div class="stat-value">${all.length}</div><div class="stat-label">总题数</div></div>
      `;
      
      if (questions.length === 0) {
        document.getElementById('review-list').innerHTML = '<div class="empty">🎉 今日复习完成！</div>';
        return;
      }
      
      document.getElementById('review-list').innerHTML = questions.map(q => `
        <div class="card">
          <div class="question">${escapeHtml(q.content)}</div>
          <div class="answer">${escapeHtml(q.answer || '暂无答案')}</div>
          <div class="tags">${(q.tags || []).map(t => `<span class="tag">${escapeHtml(t.name)}</span>`).join('')}</div>
          <div class="actions">
            <button class="btn btn-forgot" onclick="review('${q.id}', 0)">😵 忘记</button>
            <button class="btn btn-vague" onclick="review('${q.id}', 1)">🤔 模糊</button>
            <button class="btn btn-remembered" onclick="review('${q.id}', 2)">✅ 记住</button>
          </div>
        </div>
      `).join('');
    }
    
    async function loadDrafts() {
      const questions = await fetchJSON(`${API}/questions?status=draft`);
      
      if (questions.length === 0) {
        document.getElementById('draft-list').innerHTML = '<div class="empty">草稿箱为空</div>';
        return;
      }
      
      document.getElementById('draft-list').innerHTML = questions.map(q => `
        <div class="card">
          <div class="question">${escapeHtml(q.content)}</div>
          <div class="answer">${escapeHtml(q.answer || '暂无答案')}</div>
          <div class="tags">${(q.tags || []).map(t => `<span class="tag">${escapeHtml(t.name)}</span>`).join('')}</div>
        </div>
      `).join('');
    }
    
    async function review(id, grade) {
      const gradeText = ['', '', ''][grade];
      await fetch(`${API}/questions/${id}/review`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({grade})
      });
      loadReview();
    }
    
    async function createQuestion() {
      const content = document.getElementById('question-content').value;
      const answer = document.getElementById('question-answer').value;
      const tags = document.getElementById('question-tags').value.split(',').map(t => t.trim()).filter(t => t);
      
      if (!content) return alert('请输入问题内容');
      
      await fetch(`${API}/questions`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({content, answer, tags})
      });
      
      document.getElementById('question-content').value = '';
      document.getElementById('question-answer').value = '';
      document.getElementById('question-tags').value = '';
      
      alert('创建成功！');
      switchTab('draft');
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Initial load
    loadReview();
  </script>
</body>
</html>
